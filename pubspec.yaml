name: gamevault
description: "GameVault — A collection of fun single-player mobile arcade mini-games."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Game engine
  flame: ^1.18.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local storage (high scores)
  hive_flutter: ^1.1.0

  # Routing
  go_router: ^13.2.0

  # Fonts
  google_fonts: ^6.2.1

  # Utilities
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^4.0.0

  # Code generation (Riverpod)
  riverpod_generator: ^2.3.5
  build_runner: ^2.4.9

  # Hive codegen (if using typed boxes)
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  # Remove or comment out until assets are added:
  # assets:
  #   - assets/images/
  #   - assets/audio/

  # fonts:
  #   - family: AppFont
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
